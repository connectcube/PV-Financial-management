<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PV Farms — Financial Management</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --red: #C41E52;
  --red-dark: #9E1640;
  --red-light: #fce8ef;
  --red-mid: #f4bed0;
  --black: #111111;
  --gray-900: #1a1a1a;
  --gray-700: #374151;
  --gray-500: #6b7280;
  --gray-400: #9ca3af;
  --gray-200: #e5e7eb;
  --gray-100: #f3f4f6;
  --gray-50: #f9fafb;
  --white: #ffffff;
  --green: #059669;
  --green-light: #d1fae5;
  --amber: #d97706;
  --amber-light: #fef3c7;
  --blue: #2563eb;
  --blue-light: #dbeafe;
  --sidebar-w: 240px;
  --radius: 12px;
  --radius-lg: 16px;
  --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
  --shadow-md: 0 4px 12px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.05);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body { font-family: 'DM Sans', sans-serif; background: var(--gray-50); color: var(--gray-900); line-height: 1.5; min-height: 100vh; }

/* ── LAYOUT ── */
#app { display: flex; min-height: 100vh; }
#sidebar {
  width: var(--sidebar-w); flex-shrink: 0;
  background: var(--black); color: var(--white);
  display: flex; flex-direction: column;
  position: fixed; top: 0; left: 0; height: 100vh; z-index: 100;
  transition: transform .25s ease;
  overflow: hidden;
}
#main { margin-left: var(--sidebar-w); flex: 1; min-height: 100vh; }
#topbar {
  height: 64px; background: var(--white); border-bottom: 1px solid var(--gray-200);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 32px; position: sticky; top: 0; z-index: 50;
}
#content { padding: 32px; max-width: 1100px; }

/* ── SIDEBAR ── */
.sb-logo {
  padding: 20px 16px 16px;
  border-bottom: 1px solid rgba(255,255,255,.08);
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
}
.sb-logo img { width: 36px; height: 36px; object-fit: contain; border-radius: 8px; background: white; padding: 3px; }
.sb-logo-text { font-size: 16px; font-weight: 600; color: var(--white); letter-spacing: -.01em; }
.sb-logo-sub { font-size: 11px; color: rgba(255,255,255,.4); margin-top: 1px; }
.sb-nav { padding: 16px 12px; flex: 1; display: flex; flex-direction: column; gap: 2px; overflow-y: auto; min-height: 0; }
.sb-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: rgba(255,255,255,.3); padding: 12px 8px 6px; }
.sb-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px; border-radius: 8px; cursor: pointer;
  font-size: 13px; font-weight: 500; color: rgba(255,255,255,.6);
  transition: all .15s; border: none; background: none; width: 100%; text-align: left;
  font-family: 'DM Sans', sans-serif;
}
.sb-item:hover { background: rgba(255,255,255,.07); color: var(--white); }
.sb-item.active { background: var(--red); color: var(--white); }
.sb-item .icon { font-size: 16px; width: 20px; text-align: center; flex-shrink: 0; }
.sb-bottom {
  padding: 16px 12px; border-top: 1px solid rgba(255,255,255,.08);
  flex-shrink: 0;
}
.sb-user { display: flex; align-items: center; gap: 10px; padding: 8px; border-radius: 8px; }
.sb-avatar {
  width: 36px; height: 36px; border-radius: 50%; background: var(--red);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 600; color: var(--white); flex-shrink: 0;
}
.sb-user-info { flex: 1; min-width: 0; }
.sb-user-name { font-size: 13px; font-weight: 500; color: var(--white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sb-user-role { font-size: 11px; color: rgba(255,255,255,.4); }
.sb-signout { background: none; border: none; color: rgba(255,255,255,.4); cursor: pointer; font-size: 16px; padding: 4px; border-radius: 4px; }
.sb-signout:hover { color: white; }

/* ── TOPBAR ── */
.topbar-title { font-size: 18px; font-weight: 600; color: var(--gray-900); letter-spacing: -.02em; }
.topbar-right { display: flex; align-items: center; gap: 12px; }
.topbar-badge {
  padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 500;
  background: var(--red-light); color: var(--red-dark);
}
.topbar-badge.admin { background: var(--green-light); color: var(--green); }
.topbar-badge.investor { background: var(--amber-light); color: var(--amber); }

/* ── BUTTONS ── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 18px; border-radius: 8px; font-size: 14px; font-weight: 500;
  cursor: pointer; border: none; font-family: 'DM Sans', sans-serif;
  transition: all .15s; white-space: nowrap;
}
.btn-primary { background: var(--red); color: white; }
.btn-primary:hover { background: var(--red-dark); }
.btn-secondary { background: var(--white); color: var(--gray-700); border: 1px solid var(--gray-200); box-shadow: var(--shadow); }
.btn-secondary:hover { background: var(--gray-50); border-color: var(--gray-300); }
.btn-ghost { background: none; color: var(--gray-500); border: none; }
.btn-ghost:hover { color: var(--gray-900); background: var(--gray-100); }
.btn-danger { background: none; color: #dc2626; border: 1px solid #fecaca; }
.btn-danger:hover { background: #fee2e2; }
.btn-sm { padding: 5px 12px; font-size: 13px; border-radius: 6px; }
.btn-icon { padding: 7px; border-radius: 6px; }

/* ── CARDS ── */
.card {
  background: var(--white); border-radius: var(--radius-lg);
  box-shadow: var(--shadow); padding: 24px; margin-bottom: 20px;
}
.card-sm { padding: 20px; }
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.card-title { font-size: 15px; font-weight: 600; color: var(--gray-900); letter-spacing: -.01em; }
.card-subtitle { font-size: 13px; color: var(--gray-500); margin-top: 2px; }

/* ── KPI CARDS ── */
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 28px; }
.kpi {
  background: var(--white); border-radius: var(--radius-lg); padding: 22px 24px;
  box-shadow: var(--shadow); position: relative; overflow: hidden;
}
.kpi-accent { position: absolute; top: 0; left: 0; width: 4px; height: 100%; border-radius: 4px 0 0 4px; }
.kpi-label { font-size: 12px; font-weight: 500; color: var(--gray-500); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
.kpi-value { font-size: 26px; font-weight: 600; color: var(--gray-900); letter-spacing: -.03em; line-height: 1.1; }
.kpi-sub { font-size: 12px; color: var(--gray-400); margin-top: 4px; }
.kpi-trend { display: inline-flex; align-items: center; gap: 3px; font-size: 12px; font-weight: 500; margin-top: 6px; padding: 2px 7px; border-radius: 20px; }
.kpi-trend.up { background: var(--green-light); color: var(--green); }
.kpi-trend.down { background: #fee2e2; color: #dc2626; }

/* ── FORMS ── */
.form-grid { display: grid; gap: 16px; margin-bottom: 20px; }
.fg2 { grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); }
.fg3 { grid-template-columns: repeat(3, 1fr); }
.field { display: flex; flex-direction: column; gap: 6px; }
.field label { font-size: 13px; font-weight: 500; color: var(--gray-700); }
.field input, .field select, .field textarea {
  font-family: 'DM Sans', sans-serif; font-size: 14px;
  padding: 10px 14px; border: 1.5px solid var(--gray-200);
  border-radius: 8px; background: var(--white); color: var(--gray-900);
  transition: border-color .15s, box-shadow .15s; width: 100%;
}
.field input:focus, .field select:focus, .field textarea:focus {
  outline: none; border-color: var(--red); box-shadow: 0 0 0 3px rgba(196,30,82,.1);
}
.field textarea { resize: vertical; min-height: 72px; }

/* ── TABLE ── */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
thead th {
  font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em;
  color: var(--gray-500); padding: 0 16px 12px; text-align: left; white-space: nowrap;
  border-bottom: 1px solid var(--gray-100);
}
tbody td { padding: 14px 16px; border-bottom: 1px solid var(--gray-100); vertical-align: middle; color: var(--gray-700); }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: var(--gray-50); }
.td-right { text-align: right; }
.td-mono { font-family: 'DM Mono', monospace; font-size: 13px; }

/* ── BADGES ── */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; white-space: nowrap;
}
.badge-red { background: var(--red-light); color: var(--red-dark); }
.badge-green { background: var(--green-light); color: var(--green); }
.badge-amber { background: var(--amber-light); color: var(--amber); }
.badge-blue { background: var(--blue-light); color: var(--blue); }
.badge-gray { background: var(--gray-100); color: var(--gray-700); }
.badge-purple { background: #ede9fe; color: #6d28d9; }

/* ── ALERTS ── */
.alert { padding: 12px 16px; border-radius: 8px; font-size: 14px; margin-top: 12px; }
.alert-ok { background: var(--green-light); color: #065f46; }
.alert-err { background: #fee2e2; color: #991b1b; }

/* ── MISC ── */
.bar-bg { height: 6px; background: var(--gray-100); border-radius: 3px; overflow: hidden; margin-top: 4px; }
.bar-fg { height: 100%; border-radius: 3px; transition: width .5s; }
.empty-state { text-align: center; padding: 48px 24px; color: var(--gray-400); }
.empty-state .es-icon { font-size: 36px; margin-bottom: 12px; }
.empty-state .es-text { font-size: 15px; font-weight: 500; color: var(--gray-500); }
.empty-state .es-sub { font-size: 13px; margin-top: 4px; }
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.divider { height: 1px; background: var(--gray-100); margin: 20px 0; }
.page-header { margin-bottom: 28px; }
.page-title { font-size: 24px; font-weight: 700; color: var(--gray-900); letter-spacing: -.03em; }
.page-sub { font-size: 14px; color: var(--gray-500); margin-top: 4px; }
.month-pill {
  padding: 6px 14px; border-radius: 20px; border: 1.5px solid var(--gray-200);
  cursor: pointer; font-size: 13px; font-weight: 500; background: var(--white);
  color: var(--gray-600); font-family: 'DM Sans', sans-serif; transition: all .15s;
}
.month-pill:hover { border-color: var(--red); color: var(--red); }
.month-pill.active { background: var(--red); color: var(--white); border-color: var(--red); }
.pill-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
.stat-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 16px; }
.stat-mini { background: var(--gray-50); border-radius: 10px; padding: 14px 16px; }
.stat-mini-label { font-size: 11px; color: var(--gray-500); font-weight: 500; text-transform: uppercase; letter-spacing: .05em; }
.stat-mini-value { font-size: 18px; font-weight: 600; margin-top: 4px; letter-spacing: -.02em; }
.avatar {
  width: 38px; height: 38px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; flex-shrink: 0;
}
.cust-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
.cust-card {
  background: var(--white); border-radius: var(--radius-lg); padding: 20px;
  box-shadow: var(--shadow); cursor: pointer; transition: box-shadow .15s, transform .1s;
  border: 1.5px solid transparent;
}
.cust-card:hover { box-shadow: var(--shadow-md); border-color: var(--red-mid); transform: translateY(-1px); }
.prod-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
.prod-card {
  background: var(--white); border-radius: var(--radius-lg); padding: 20px;
  box-shadow: var(--shadow); transition: box-shadow .15s;
}
.prod-card:hover { box-shadow: var(--shadow-md); }

/* ── LOGIN ── */
#login-screen {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, var(--black) 0%, #2a0a18 100%);
}
.login-box { width: 100%; max-width: 420px; padding: 20px; }
.login-card { background: var(--white); border-radius: 20px; padding: 40px; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
.login-logo { text-align: center; margin-bottom: 32px; }
.login-logo img { width: 80px; height: 80px; object-fit: contain; }
.login-title { font-size: 22px; font-weight: 700; text-align: center; color: var(--gray-900); letter-spacing: -.02em; margin-bottom: 4px; }
.login-sub { font-size: 14px; color: var(--gray-500); text-align: center; margin-bottom: 28px; }
.login-footer { text-align: center; font-size: 12px; color: rgba(255,255,255,.4); margin-top: 20px; }

@media (max-width: 768px) {
  #sidebar { transform: translateX(-100%); }
  #sidebar.open { transform: translateX(0); }
  #main { margin-left: 0; }
  #content { padding: 20px 16px; }
  .two-col { grid-template-columns: 1fr; }
  .kpi-grid { grid-template-columns: 1fr 1fr; }
}

.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(196,30,82,.25);border-top-color:#C41E52;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
#init-overlay{position:fixed;inset:0;background:rgba(17,17,17,.94);display:none;align-items:center;justify-content:center;z-index:9999;font-family:'DM Sans',sans-serif;color:white;font-size:15px;gap:12px;flex-direction:column}
.divider{height:1px;background:var(--gray-100);margin:18px 0}
</style>
</head>

<script>
// Global error catcher - shows any crash visibly on screen
window.onerror = function(msg, src, line, col, err) {
  document.body.innerHTML = '<div style="font-family:monospace;padding:40px;background:#fee2e2;min-height:100vh">'
    + '<h2 style="color:#991b1b;margin-bottom:16px">PV Farms — JavaScript Error</h2>'
    + '<p style="margin-bottom:8px"><b>Error:</b> ' + msg + '</p>'
    + '<p style="margin-bottom:8px"><b>Line:</b> ' + line + ', Col: ' + col + '</p>'
    + '<p style="margin-bottom:8px"><b>File:</b> ' + src + '</p>'
    + '<pre style="background:#fff;padding:16px;border-radius:8px;overflow:auto;font-size:13px">' + (err ? err.stack : 'No stack') + '</pre>'
    + '<p style="margin-top:16px;color:#666">Please copy this error and share it for debugging.</p>'
    + '</div>';
  return true;
};
window.onunhandledrejection = function(e) {
  console.error("Unhandled rejection:", e.reason);
  const msg = e.reason ? (e.reason.stack || e.reason.message || String(e.reason)) : 'Unknown promise rejection';
  const root = document.getElementById("root");
  const target = root || document.body;
  target.innerHTML = '<div style="font-family:monospace;padding:40px;background:#fee2e2;min-height:100vh">'
    + '<h2 style="color:#991b1b;margin-bottom:16px">PV Farms — Promise Error</h2>'
    + '<pre style="background:#fff;padding:16px;border-radius:8px;overflow:auto;font-size:13px">' + msg + '</pre>'
    + '<p style="margin-top:12px;color:#666">Please screenshot this and share it.</p>'
    + '</div>';

async function sbFetch(path, method="GET", body=null) {
  const opts = {
    method,
    headers: {
      "apikey": SB_KEY,
      "Authorization": "Bearer " + SB_KEY,
      "Content-Type": "application/json",
      "Prefer": method === "POST" ? "return=representation" : ""
    }
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(SB_URL + "/rest/v1/" + path, opts);
  if (!res.ok) { const err = await res.text(); throw new Error(err); }
  const txt = await res.text();
  return txt ? JSON.parse(txt) : [];
}

// Loading overlay
function showOverlay(msg) {
  let el = document.getElementById("init-overlay");
  if (!el) {
    el = document.createElement("div");
    el.id = "init-overlay";
    el.style.cssText = "position:fixed;inset:0;background:rgba(17,17,17,.92);display:flex;align-items:center;justify-content:center;z-index:9999;font-family:'DM Sans',sans-serif;color:white;font-size:16px;gap:12px;flex-direction:column";
    document.body.appendChild(el);
  }
  el.innerHTML = '<div style="width:36px;height:36px;border:3px solid rgba(196,30,82,.3);border-top-color:#C41E52;border-radius:50%;animation:spin .7s linear infinite"></div><div>' + (msg||"Loading...") + '</div>';
  el.style.display = "flex";
}
function hideOverlay() {
  const el = document.getElementById("init-overlay");
  if (el) el.style.display = "none";
}

async function init() {
  console.log("PV Farms init() starting...");
  showOverlay("Loading PV Farms...");

  // ── Load core tables one by one for clear error diagnosis ─────
  try {
    console.log("Loading pv_users...");
    const users = await DB.all("pv_users");
    console.log("pv_users OK:", users.length);

    console.log("Loading pv_products...");
    const products = await DB.all("pv_products");
    console.log("pv_products OK:", products.length);

    console.log("Loading pv_income...");
    const income = await DB.all("pv_income", "date");
    console.log("pv_income OK:", income.length);

    console.log("Loading pv_expenses...");
    const expenses = await DB.all("pv_expenses", "date");
    console.log("pv_expenses OK:", expenses.length);

    console.log("Loading pv_customers...");
    const customers = await DB.all("pv_customers");
    console.log("pv_customers OK:", customers.length);

    APP.users     = users || [];
    APP.products  = (products || []).map(p => ({...p, costPerUnit: Number(p.cost_per_unit||0), price: Number(p.price||0)}));
    APP.income    = (income || []).map(r => ({...r, productId: r.product_id, customerId: r.customer_id, total: Number(r.total||0), qty: Number(r.qty||0), price: Number(r.price||0)})).sort((a,b) => new Date(b.date) - new Date(a.date));
    APP.expenses  = (expenses || []).map(r => ({...r, group: r.grp, total: Number(r.total||0), qty: Number(r.qty||0), cost: Number(r.cost||0)})).sort((a,b) => new Date(b.date) - new Date(a.date));
    APP.customers = customers || [];
    console.log("Core tables loaded. Users:", APP.users.length);

    if (!APP.users.length) {
      hideOverlay();
      alert("Database connected but no users found.\nPlease run the Supabase setup SQL first.");
      return;
    }
  } catch(e) {
    console.error("CORE TABLE ERROR:", e);
    hideOverlay();
    document.getElementById("root").innerHTML = '<div style="padding:40px;font-family:monospace;background:#fee2e2;min-height:100vh">'
      + '<h2 style="color:#991b1b;margin-bottom:12px">Database load failed</h2>'
      + '<p style="margin-bottom:8px"><b>' + e.message + '</b></p>'
      + '<pre style="background:#fff;padding:16px;border-radius:8px;font-size:12px;overflow:auto">' + (e.stack||e) + '</pre>'
      + '</div>';
    return;
  }

  // ── Load billing & payroll tables individually ────────────────
  const billingTables = [
    ["pv_quotes",    r => ({...r, total: Number(r.total||0), subtotal: Number(r.subtotal||0)}), "quotes"],
    ["pv_invoices",  r => ({...r, total: Number(r.total||0), subtotal: Number(r.subtotal||0)}), "invoices"],
    ["pv_receipts",  r => r, "receipts"],
    ["pv_employees", r => r, "employees"],
    ["pv_payslips",  r => ({...r, net_pay: Number(r.net_pay||0), gross_pay: Number(r.gross_pay||0)}), "payslips"],
    ["pv_counters",  r => r, "_counters"],
  ];
  for (const [table, mapper, key] of billingTables) {
    try {
      console.log("Loading", table + "...");
      const rows = await DB.all(table);
      if (key === "_counters") {
        const ctrMap = {};
        (rows||[]).forEach(c => ctrMap[c.name] = Number(c.value));
        APP.counters = {quote: ctrMap.quote||0, invoice: ctrMap.invoice||0, receipt: ctrMap.receipt||0, payslip: ctrMap.payslip||0};
      } else {
        APP[key] = (rows||[]).map(mapper);
      }
      console.log(table, "OK:", (rows||[]).length);
    } catch(e) {
      console.warn(table, "not available (run setup SQL):", e.message);
    }
  }

  console.log("All tables loaded. Calling render()...");
  hideOverlay();
  APP.loaded = true;
  render();
}

  {id:"invoices",  label:"Invoices",   icon:"🧾", roles:["superadmin","admin","investor"]},
  {id:"receipts",  label:"Receipts",   icon:"✅", roles:["superadmin","admin","investor"]},
  {id:"employees", label:"Employees",  icon:"👷", roles:["superadmin","admin"]},
  {id:"payroll",   label:"Payroll",    icon:"💼", roles:["superadmin","admin"]},
  {id:"monthly",   label:"Monthly",    icon:"📅", roles:["superadmin","admin","investor"]},
  {id:"users",     label:"Users",      icon:"👥", roles:["superadmin"]},
];

function appShell() {
  const role = APP.user.role;
  const vtabs = TABS.filter(t => t.roles.includes(role));
  const badgeClass = role==="superadmin"?"badge-red":role==="admin"?"badge-green admin":"badge-amber investor";
  const badgeLabel = role==="superadmin"?"Super Admin":role==="admin"?"Admin":"Investor";
  const tabNames = {dashboard:"Dashboard",income:"Income",expenses:"Expenses",products:"Products",customers:"Customers",quotes:"Quotes",invoices:"Invoices",receipts:"Receipts",employees:"Employees",payroll:"Payroll",monthly:"Monthly Reports",users:"User Management"};

  return `<div id="app">
    <aside id="sidebar">
      <div class="sb-logo">
        <img src="${LOGO_SRC}" alt="PV Farms logo">
        <div><div class="sb-logo-text">PV Farms</div><div class="sb-logo-sub">Financial System</div></div>
      </div>
      <nav class="sb-nav">
        <div class="sb-label">Overview</div>
        ${vtabs.filter(t=>["dashboard","monthly"].includes(t.id)).map(t => `<button class="sb-item ${APP.tab===t.id?"active":""}" onclick="sw('${t.id}')"><span class="icon">${t.icon}</span>${t.label}</button>`).join("")}
        <div class="sb-label">Finances</div>
        ${vtabs.filter(t=>["income","expenses","products","customers"].includes(t.id)).map(t => `<button class="sb-item ${APP.tab===t.id?"active":""}" onclick="sw('${t.id}')"><span class="icon">${t.icon}</span>${t.label}</button>`).join("")}
        <div class="sb-label">Billing</div>
        ${vtabs.filter(t=>["quotes","invoices","receipts"].includes(t.id)).map(t => `<button class="sb-item ${APP.tab===t.id?"active":""}" onclick="sw('${t.id}')"><span class="icon">${t.icon}</span>${t.label}</button>`).join("")}
        <div class="sb-label">People</div>
        ${vtabs.filter(t=>["employees","payroll","users"].includes(t.id)).map(t => `<button class="sb-item ${APP.tab===t.id?"active":""}" onclick="sw('${t.id}')"><span class="icon">${t.icon}</span>${t.label}</button>`).join("")}
      </nav>
      <div class="sb-bottom">
        <div class="sb-user">
          <div class="sb-avatar">${initials(APP.user.name)}</div>
          <div class="sb-user-info">
            <div class="sb-user-name">${APP.user.name}</div>
            <div class="sb-user-role">${badgeLabel}</div>
          </div>
          <button class="sb-signout" onclick="doLogout()" title="Sign out">↩</button>
        </div>
      </div>
    </aside>
    <main id="main">
      <div id="topbar">
        <div class="topbar-title">${tabNames[APP.tab]||APP.tab}</div>
        <div class="topbar-right">
          <span class="topbar-badge ${badgeClass}">${badgeLabel}</span>
          <span style="font-size:14px;color:var(--gray-500)">${APP.user.name}</span>
        </div>
      </div>
      <div id="content">
        <div id="vh"></div>
      </div>
    </main>
  </div>`;
}

function bindSidebar() {}
function sw(t) {
  APP.tab=t; da();
  ST.custView=null; ST.editCustId=null; ST.editProdId=null;
  ST.quoteView=null; ST.quoteForm=undefined;
  ST.invoiceView=null; ST.invoiceForm=undefined;
  ST.receiptView=null; ST.empForm=undefined;
  ST.payslipView=null; ST.payslipForm=undefined;
  document.getElementById("sidebar")?.classList.remove("open");
  render();
}
function renderView() {
  const h = document.getElementById("vh"); if(!h) return;
  const ro = APP.user.role==="investor";
  if(APP.tab==="dashboard")  rDash(h);
  else if(APP.tab==="income")    rIncome(h,ro);
  else if(APP.tab==="expenses")  rExp(h,ro);
  else if(APP.tab==="products")  rProds(h,ro);
  else if(APP.tab==="customers") rCusts(h,ro);
  else if(APP.tab==="quotes")    rQuotes(h,ro);
  else if(APP.tab==="invoices")  rInvoices(h,ro);
  else if(APP.tab==="receipts")  rReceipts(h,ro);
  else if(APP.tab==="employees") rEmployees(h,ro);
  else if(APP.tab==="payroll")   rPayroll(h,ro);
  else if(APP.tab==="monthly")   rMonthly(h);
  else if(APP.tab==="users" && APP.user.role==="superadmin") rUsers(h);
}

const kpi = (label,value,sub,color,trend) => `
  <div class="kpi">
    <div class="kpi-accent" style="background:${color}"></div>
    <div class="kpi-label">${label}</div>
    <div class="kpi-value" style="color:${color==="var(--red)"||color===RED?"var(--gray-900)":"var(--gray-900)"}">${value}</div>
    ${sub?`<div class="kpi-sub">${sub}</div>`:""}
    ${trend?`<div class="kpi-trend ${trend>=0?"up":"down"}">${trend>=0?"↑":"↓"} ${Math.abs(trend).toFixed(1)}%</div>`:""}
  </div>`;

// ══════════════════════════════════════════════════════════════
// DASHBOARD
// ══════════════════════════════════════════════════════════════
function rDash(h) {
  const sm = ST.dashMonth;
  const tI = APP.income.reduce((s,r)=>s+r.total,0);
  const tE = APP.expenses.reduce((s,r)=>s+r.total,0);
  const net = tI-tE, mg = tI>0?(net/tI)*100:0;
  const allMK = [...new Set([...APP.income.map(r=>MK(r.date)),...APP.expenses.map(r=>MK(r.date))].filter(Boolean))].sort();
  const now = TD().slice(0,7);
  if(!allMK.includes(now)) allMK.push(now);
  allMK.sort();
  const last12 = allMK.slice(-12);
  const fI = sm?APP.income.filter(r=>MK(r.date)===sm):APP.income;
  const fE = sm?APP.expenses.filter(r=>MK(r.date)===sm):APP.expenses;
  const ftI=fI.reduce((s,r)=>s+r.total,0),ftE=fE.reduce((s,r)=>s+r.total,0),fnet=ftI-ftE;

  const trendI = last12.map(m=>Math.round(APP.income.filter(r=>MK(r.date)===m).reduce((s,r)=>s+r.total,0)));
  const trendE = last12.map(m=>Math.round(APP.expenses.filter(r=>MK(r.date)===m).reduce((s,r)=>s+r.total,0)));
  const trendN = last12.map((_,i)=>trendI[i]-trendE[i]);

  const egD = Object.keys(EG).map(g=>({g, t:(sm?fE:APP.expenses).filter(r=>r.group===g).reduce((s,r)=>s+r.total,0)})).filter(x=>x.t>0).sort((a,b)=>b.t-a.t);
  const pd = APP.products.map((p,i)=>{
    const src = sm?APP.income.filter(r=>MK(r.date)===sm):APP.income;
    const rev = src.filter(r=>r.productId===p.id||r.product===p.name).reduce((s,r)=>s+r.total,0);
    const units = src.filter(r=>r.productId===p.id||r.product===p.name).reduce((s,r)=>s+r.qty,0);
    return {...p, rev, units, profit: rev - units*p.costPerUnit, color: PCOLORS[i%PCOLORS.length]};
  });
  const recent = [...APP.income.map(r=>({...r,_t:"income"})),...APP.expenses.map(r=>({...r,_t:"expense",product:r.category}))].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,7);

  h.innerHTML = `
  <div class="page-header" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
    <div>
      <div class="page-title">${sm?"Monthly View":"Business Overview"}</div>
      <div class="page-sub">${sm?FM(sm)+" performance":"All-time financial summary for PV Farms"}</div>
    </div>
    ${sm?`<button class="btn btn-secondary btn-sm" onclick="ST.dashMonth=null;rDash(document.getElementById('vh'))">✕ Clear filter</button>`:""}
  </div>

  <div class="kpi-grid">
    ${kpi(sm?"Month Income":"Total Income", ZMW(sm?ftI:tI), sm?FM(sm):APP.income.length+" sales", GREEN)}
    ${kpi(sm?"Month Expenses":"Total Expenses", ZMW(sm?ftE:tE), sm?FM(sm):APP.expenses.length+" items", RED)}
    ${kpi("Net Profit", ZMW(sm?fnet:net), "After all costs", (sm?fnet:net)>=0?GREEN:RED)}
    ${kpi("Profit Margin", PCT(sm?ftI>0?(fnet/ftI)*100:0:mg), "Revenue efficiency", BLUE)}
    ${kpi("Customers", APP.customers.length, "Registered", "#8b5cf6")}
    ${kpi("Products", APP.products.length, "In catalog", AMBER)}
  </div>

  <!-- Month filter -->
  <div class="card card-sm" style="margin-bottom:20px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px">
      <div>
        <div style="font-size:14px;font-weight:600;color:var(--gray-900)">Filter by month</div>
        <div style="font-size:12px;color:var(--gray-500);margin-top:2px">${sm?"Showing "+FM(sm)+" only — click again to clear":"Click a month to zoom in, or leave unselected for full overview"}</div>
      </div>
    </div>
    <div class="pill-row">
      ${last12.map(m=>`<button class="month-pill ${m===sm?"active":""}" onclick="ST.dashMonth=ST.dashMonth==='${m}'?null:'${m}';rDash(document.getElementById('vh'))">${FM(m)}</button>`).join("")}
    </div>
  </div>

  <!-- Charts row 1 -->
  <div class="two-col" style="margin-bottom:20px">
    <div class="card" style="margin-bottom:0">
      <div class="card-header">
        <div>
          <div class="card-title">📈 Monthly Income</div>
          <div class="card-subtitle">Income trend over last 12 months</div>
        </div>
        <div style="display:flex;gap:10px;font-size:12px;color:var(--gray-500)">
          <span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${GREEN};margin-right:4px;vertical-align:middle"></span>Income</span>
          <span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${RED};margin-right:4px;vertical-align:middle"></span>Expenses</span>
        </div>
      </div>
      <div style="position:relative;height:220px"><canvas id="ch-line" role="img" aria-label="Monthly income and expenses line chart"></canvas></div>
    </div>
    <div class="card" style="margin-bottom:0">
      <div class="card-header">
        <div>
          <div class="card-title">🥧 Expense Categories</div>
          <div class="card-subtitle">${sm?FM(sm)+" breakdown":"All-time expense split"}</div>
        </div>
      </div>
      ${egD.length?`
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">
        ${egD.slice(0,5).map((x,i)=>`<span style="font-size:11px;color:var(--gray-500);display:flex;align-items:center;gap:3px">
          <span style="width:8px;height:8px;border-radius:50%;background:${PCOLORS[i%PCOLORS.length]};display:inline-block"></span>${x.g}
        </span>`).join("")}
      </div>
      <div style="position:relative;height:185px"><canvas id="ch-pie" role="img" aria-label="Expense categories pie chart"></canvas></div>`
      :`<div class="empty-state"><div class="es-icon">🧾</div><div class="es-text">No expenses recorded</div></div>`}
    </div>
  </div>

  <!-- Profit trend bar -->
  <div class="card" style="margin-bottom:20px">
    <div class="card-header">
      <div>
        <div class="card-title">📊 Profit Trend</div>
        <div class="card-subtitle">Monthly net profit over last 12 months${sm?" · "+FM(sm)+" highlighted":""}</div>
      </div>
      <div style="display:flex;gap:10px;font-size:12px;color:var(--gray-500)">
        <span><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${GREEN};margin-right:4px;vertical-align:middle"></span>Profit</span>
        <span><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:#fee2e2;border:1px solid ${RED};margin-right:4px;vertical-align:middle"></span>Loss</span>
      </div>
    </div>
    <div style="position:relative;height:200px"><canvas id="ch-profit" role="img" aria-label="Monthly profit bar chart"></canvas></div>
  </div>

  <!-- Row 3: revenue by product + top customers -->
  <div class="two-col" style="margin-bottom:20px">
    <div class="card" style="margin-bottom:0">
      <div class="card-header">
        <div class="card-title">Revenue by product</div>
      </div>
      ${pd.some(p=>p.rev>0)?pd.map((p,i)=>`
        <div style="margin-bottom:14px">
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px">
            <span style="font-weight:500;color:var(--gray-700)">${p.name}</span>
            <span style="font-weight:600;color:var(--gray-900);font-family:'DM Mono',monospace">${ZMW(p.rev)}</span>
          </div>
          <div class="bar-bg"><div class="bar-fg" style="width:${pd.reduce((mx,x)=>Math.max(mx,x.rev),1)>0?(p.rev/pd.reduce((mx,x)=>Math.max(mx,x.rev),1))*100:0}%;background:${p.color}"></div></div>
        </div>`).join(""):`<div class="empty-state" style="padding:24px"><div class="es-text">No sales yet</div></div>`}
    </div>
    <div class="card" style="margin-bottom:0">
      <div class="card-header"><div class="card-title">Top customers</div></div>
      ${APP.customers.length?APP.customers.map(c=>({...c,rev:APP.income.filter(r=>r.customerId===c.id).reduce((s,r)=>s+r.total,0)})).sort((a,b)=>b.rev-a.rev).slice(0,5).map((c,i)=>{
        const cl = CCOLORS[i%CCOLORS.length];
        const mx = APP.customers.map(x=>APP.income.filter(r=>r.customerId===x.id).reduce((s,r)=>s+r.total,0)).reduce((a,b)=>Math.max(a,b),1);
        return `<div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
          <div class="avatar" style="background:${cl}18;color:${cl}">${initials(c.name)}</div>
          <div style="flex:1;min-width:0">
            <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">
              <span style="font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.name}</span>
              <span style="font-weight:600;color:${GREEN};font-family:'DM Mono',monospace;flex-shrink:0;margin-left:8px">${ZMW(c.rev)}</span>
            </div>
            <div class="bar-bg"><div class="bar-fg" style="width:${(c.rev/mx)*100}%;background:${cl}"></div></div>
          </div>
        </div>`;
      }).join(""):`<div class="empty-state" style="padding:24px"><div class="es-text">No customers linked</div></div>`}
    </div>
  </div>

  <!-- Recent transactions -->
  <div class="card">
    <div class="card-header"><div class="card-title">Recent transactions</div><div class="card-subtitle">${recent.length} latest entries</div></div>
    ${recent.length?`<div class="table-wrap"><table>
      <thead><tr><th>Date</th><th>Description</th><th>Type</th><th class="td-right">Amount</th></tr></thead>
      <tbody>${recent.map(r=>`<tr>
        <td style="color:var(--gray-500);font-size:13px">${FD(r.date)}</td>
        <td style="font-weight:500">${r.product||""}</td>
        <td><span class="badge ${r._t==="income"?"badge-green":"badge-red"}">${r._t==="income"?"Sale":"Expense"}</span></td>
        <td class="td-right td-mono" style="color:${r._t==="income"?GREEN:RED};font-weight:600">${r._t==="income"?"+":"−"}${ZMW(r.total)}</td>
      </tr>`).join("")}</tbody>
    </table></div>`:`<div class="empty-state"><div class="es-icon">📋</div><div class="es-text">No transactions yet</div><div class="es-sub">Start by recording a sale or expense</div></div>`}
  </div>`;

  setTimeout(()=>{
    // Line chart — income & expenses
    dc("ch-line");
    const bgI = last12.map(m=>m===sm?"rgba(5,150,105,.9)":"rgba(5,150,105,.35)");
    const bgE = last12.map(m=>m===sm?"rgba(196,30,82,.9)":"rgba(196,30,82,.3)");
    CH["ch-line"] = new Chart(document.getElementById("ch-line"),{
      type:"line",
      data:{labels:last12.map(FM),datasets:[
        {label:"Income",data:trendI,borderColor:GREEN,backgroundColor:"rgba(5,150,105,.08)",tension:.4,fill:true,pointRadius:last12.map(m=>m===sm?6:3),pointBackgroundColor:bgI,pointBorderColor:"transparent"},
        {label:"Expenses",data:trendE,borderColor:RED,backgroundColor:"rgba(196,30,82,.05)",tension:.4,fill:true,borderDash:[4,3],pointRadius:last12.map(m=>m===sm?6:3),pointBackgroundColor:bgE,pointBorderColor:"transparent"}
      ]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.dataset.label+": "+ZMW(c.raw)}}},scales:{x:{grid:{display:false},ticks:{font:{size:10},autoSkip:false,maxRotation:45,color:"#9ca3af"}},y:{grid:{color:"#f3f4f6"},ticks:{callback:v=>v>=1000?(v/1000).toFixed(0)+"K":v,font:{size:10},color:"#9ca3af"}}}}
    });

    // Pie — expense categories
    if(egD.length && document.getElementById("ch-pie")) {
      dc("ch-pie");
      CH["ch-pie"] = new Chart(document.getElementById("ch-pie"),{
        type:"doughnut",
        data:{labels:egD.map(x=>x.g),datasets:[{data:egD.map(x=>Math.round(x.t)),backgroundColor:PCOLORS.slice(0,egD.length),borderWidth:3,borderColor:"#ffffff"}]},
        options:{responsive:true,maintainAspectRatio:false,cutout:"55%",plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.label+": "+ZMW(c.raw)}}}}
      });
    }

    // Bar — profit trend
    dc("ch-profit");
    CH["ch-profit"] = new Chart(document.getElementById("ch-profit"),{
      type:"bar",
      data:{labels:last12.map(FM),datasets:[{label:"Net Profit",data:trendN,backgroundColor:trendN.map((v,i)=>last12[i]===sm?(v>=0?"rgba(5,150,105,.9)":"rgba(196,30,82,.9)"):(v>=0?"rgba(5,150,105,.4)":"rgba(196,30,82,.35)")),borderRadius:6,borderSkipped:false}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>ZMW(c.raw)}}},scales:{x:{grid:{display:false},ticks:{font:{size:10},autoSkip:false,maxRotation:45,color:"#9ca3af"}},y:{grid:{color:"#f3f4f6"},ticks:{callback:v=>v>=1000?(v/1000).toFixed(0)+"K":v<=-1000?"-"+(Math.abs(v)/1000).toFixed(0)+"K":v,font:{size:10},color:"#9ca3af"}}}}
    });
  },80);
}

// INCOME
// ══════════════════════════════════════════════════════════════
function rIncome(h,ro) {
  const filt=ST.incFilt||"";
  const rows=APP.income.filter(r=>!filt||r.productId===filt).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const tot=rows.reduce((s,r)=>s+r.total,0);
  h.innerHTML=`
  <div class="page-header">
    <div class="page-title">Income</div>
    <div class="page-sub">Track every sale made by PV Farms</div>
  </div>
  ${!ro?`<div class="card">
    <div class="card-header"><div class="card-title">Record a sale</div></div>
    <div class="form-grid fg2">
      <div class="field"><label>Date <span style="font-weight:400;color:var(--gray-400);font-size:11px">— any past date works</span></label><input type="date" id="id" value="${TD()}"></div>
      <div class="field"><label>Product</label><select id="ip" onchange="fP()">${APP.products.map(p=>`<option value="${p.id}">${p.name}</option>`).join("")}<option value="_other">Other</option></select></div>
      <div class="field"><label>Quantity sold</label><input type="number" id="iq" placeholder="e.g. 50" min="0" step="0.01"></div>
      <div class="field"><label>Unit</label><input id="iu" placeholder="auto-fills"></div>
      <div class="field"><label>Unit price (ZMW)</label><input type="number" id="ipr" placeholder="0.00" min="0" step="0.01"></div>
      <div class="field"><label>Customer (optional)</label><select id="icust"><option value="">— Walk-in / unlinked —</option>${APP.customers.map(c=>`<option value="${c.id}">${c.name}</option>`).join("")}</select></div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <button class="btn btn-primary" onclick="addInc()">Record sale</button>
      <span id="ipr2" style="font-size:14px;color:var(--gray-500);font-weight:500"></span>
    </div>
    <div id="imsg"></div>
  </div>`:""}
  <div class="card">
    <div class="card-header">
      <div>
        <div class="card-title">Sales history</div>
        <div class="card-subtitle" style="color:${GREEN};font-weight:600;font-size:15px">${ZMW(tot)}</div>
      </div>
      <select style="width:auto;font-family:'DM Sans',sans-serif;font-size:13px;padding:7px 12px;border:1.5px solid var(--gray-200);border-radius:8px;background:white;color:var(--gray-700)" onchange="ST.incFilt=this.value;rIncome(document.getElementById('vh'),${ro})">
        <option value="">All products</option>
        ${APP.products.map(p=>`<option value="${p.id}" ${filt===p.id?"selected":""}>${p.name}</option>`).join("")}
      </select>
    </div>
    ${rows.length?`<div class="table-wrap"><table>
      <thead><tr><th>Date</th><th>Product</th><th>Quantity</th><th class="td-right">Unit price</th><th class="td-right">Total</th><th>Customer</th>${!ro?"<th></th>":""}</tr></thead>
      <tbody>${rows.map(r=>{const c=r.customerId?APP.customers.find(x=>x.id===r.customerId):null;return`<tr>
        <td style="color:var(--gray-500);font-size:13px">${FD(r.date)}</td>
        <td><span class="badge badge-gray">${r.product}</span></td>
        <td style="font-weight:500">${r.qty} ${r.unit}</td>
        <td class="td-right td-mono">${ZMW(r.price)}</td>
        <td class="td-right td-mono" style="color:${GREEN};font-weight:600">${ZMW(r.total)}</td>

        ${!ro?`<td><button class="btn btn-danger btn-sm btn-icon" onclick="dInc('${r.id}')" title="Delete">✕</button></td>`:""}

function rMonthly(h){
  const allM=[...new Set([...APP.income.map(r=>MK(r.date)),...APP.expenses.map(r=>MK(r.date))].filter(Boolean))].sort().reverse();
  const now=TD().slice(0,7);if(!allM.includes(now))allM.unshift(now);
  const sel=ST.monSel||allM[0]||now;ST.monSel=sel;
  const mI=APP.income.filter(r=>MK(r.date)===sel),mE=APP.expenses.filter(r=>MK(r.date)===sel);
  const tI=mI.reduce((s,r)=>s+r.total,0),tE=mE.reduce((s,r)=>s+r.total,0),net=tI-tE;
  const yr=sel.slice(0,4);
  const ytd=MN.map((_,i)=>{const mk=yr+"-"+(i+1<10?"0":"")+(i+1);const inc=APP.income.filter(r=>MK(r.date)===mk).reduce((s,r)=>s+r.total,0);const exp=APP.expenses.filter(r=>MK(r.date)===mk).reduce((s,r)=>s+r.total,0);return{mk,inc,exp,net:inc-exp};});
  const ytdI=ytd.reduce((s,r)=>s+r.inc,0),ytdE=ytd.reduce((s,r)=>s+r.exp,0),ytdN=ytdI-ytdE;
  const eg=Object.keys(EG).map(g=>({g,t:mE.filter(r=>r.group===g).reduce((s,r)=>s+r.total,0)})).filter(x=>x.t>0);
  h.innerHTML=`
  <div class="page-header" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
    <div><div class="page-title">Monthly Reports</div><div class="page-sub">Detailed breakdown by month — including past months like April, May and earlier</div></div>
    <select style="font-family:'DM Sans',sans-serif;font-size:14px;padding:9px 14px;border:1.5px solid var(--gray-200);border-radius:8px;background:white;color:var(--gray-700);font-weight:500" onchange="ST.monSel=this.value;rMonthly(document.getElementById('vh'))">${allM.map(m=>`<option value="${m}" ${m===sel?"selected":""}>${FM(m)}</option>`).join("")}</select>
  </div>
  <div class="kpi-grid">
    ${kpi("Income", ZMW(tI), mI.length+" sales", GREEN)}
    ${kpi("Expenses", ZMW(tE), mE.length+" items", RED)}
    ${kpi("Net profit", ZMW(net), "", net>=0?GREEN:RED)}
    ${kpi("Margin", tI>0?PCT((net/tI)*100):"—", "", BLUE)}
  </div>
  <div class="two-col" style="margin-bottom:20px">
    <div class="card" style="margin-bottom:0"><div class="card-header"><div class="card-title">Sales — ${FM(sel)}</div></div>
    ${mI.length?`<div class="table-wrap"><table><thead><tr><th>Date</th><th>Product</th><th>Customer</th><th class="td-right">Total</th></tr></thead>
    <tbody>${mI.map(r=>{const c=r.customerId?APP.customers.find(x=>x.id===r.customerId):null;return`<tr><td style="font-size:13px;color:var(--gray-500)">${FD(r.date)}</td><td style="font-weight:500">${r.product}</td><td style="font-size:13px;color:var(--gray-500)">${c?c.name:r.customer||"—"}</td><td class="td-right td-mono" style="color:${GREEN};font-weight:600">${ZMW(r.total)}</td></tr>`;}).join("")}
    <tr style="background:var(--gray-50)"><td colspan="3" style="text-align:right;font-weight:600;padding:12px 16px">Total</td><td class="td-right td-mono" style="color:${GREEN};font-weight:700">${ZMW(tI)}</td></tr>
    </tbody></table></div>`:`<div class="empty-state" style="padding:32px"><div class="es-text">No sales this month</div></div>`}
    </div>
    <div class="card" style="margin-bottom:0"><div class="card-header"><div class="card-title">Expenses — ${FM(sel)}</div></div>
    ${eg.length?`${eg.map(({g,t})=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--gray-100)">
      <span style="font-size:14px;font-weight:500;color:var(--gray-700)">${g}</span>
      <span style="font-weight:600;color:${RED};font-family:'DM Mono',monospace">${ZMW(t)}</span>
    </div>`).join("")}
    <div style="padding-top:12px;text-align:right;font-size:15px;font-weight:700;color:${RED};font-family:'DM Mono',monospace">${ZMW(tE)}</div>`
    :`<div class="empty-state" style="padding:32px"><div class="es-text">No expenses this month</div></div>`}
    </div>
  </div>
  <div class="card"><div class="card-header"><div class="card-title">Year-to-date — ${yr}</div></div>
  <div class="table-wrap"><table>
    <thead><tr><th>Month</th><th class="td-right">Income</th><th class="td-right">Expenses</th><th class="td-right">Net profit</th><th class="td-right">Margin</th></tr></thead>
    <tbody>
    ${ytd.map(r=>`<tr style="${r.mk===sel?"background:rgba(196,30,82,.03);":""}" >
      <td style="font-weight:${r.mk===sel?"600":"400"};color:${r.mk===sel?RED:"var(--gray-700)"}">
        ${FM(r.mk)}${r.mk===sel?` <span class="badge badge-red" style="font-size:10px;margin-left:4px">Selected</span>`:""}
      </td>
      <td class="td-right td-mono" style="color:${r.inc?GREEN:"var(--gray-300)"}">${r.inc?ZMW(r.inc):"—"}</td>
      <td class="td-right td-mono" style="color:${r.exp?RED:"var(--gray-300)"}">${r.exp?ZMW(r.exp):"—"}</td>
      <td class="td-right td-mono" style="font-weight:600;color:${(r.inc||r.exp)?(r.net>=0?GREEN:RED):"var(--gray-300)"}">${(r.inc||r.exp)?ZMW(r.net):"—"}</td>
      <td class="td-right" style="color:${r.inc>0?(r.net>=0?GREEN:RED):"var(--gray-300)"}">${r.inc>0?PCT((r.net/r.inc)*100):"—"}</td>
    </tr>`).join("")}
    <tr style="background:var(--gray-50);font-weight:700">
      <td>YTD ${yr}</td>
      <td class="td-right td-mono" style="color:${GREEN}">${ZMW(ytdI)}</td>
      <td class="td-right td-mono" style="color:${RED}">${ZMW(ytdE)}</td>
      <td class="td-right td-mono" style="color:${ytdN>=0?GREEN:RED}">${ZMW(ytdN)}</td>
      <td class="td-right" style="color:${ytdN>=0?GREEN:RED}">${ytdI>0?PCT((ytdN/ytdI)*100):"—"}</td>
    </tr>
    </tbody>
  </table></div></div>`;
}

async function aUser(){
  const n=document.getElementById("un")?.value.trim(),u=document.getElementById("uu")?.value.trim(),p=document.getElementById("upw")?.value,r=document.getElementById("ur")?.value;
  if(!n||!u||!p){const el=document.getElementById("umsg");if(el)el.innerHTML='<div class="alert aerr">Please fill all fields.</div>';return;}
  if(APP.users.find(x=>x.username.toLowerCase()===u.toLowerCase())){const el=document.getElementById("umsg");if(el)el.innerHTML='<div class="alert aerr">Username already exists.</div>';return;}
  try{const nu={id:UID(),name:n,username:u,password:p,role:r};await DB.insert("pv_users",nu);APP.users.push(nu);}
  catch(e){alert("Save failed: "+e.message);return;}
  rUsers(document.getElementById("vh"));
}
async function rmUser(id){
  if(id===APP.user.id){alert("You cannot remove your own account.");return;}
  if(!confirm("Remove this user?"))return;
  try{await DB.del("pv_users",id);APP.users=APP.users.filter(u=>u.id!==id);}
  catch(e){alert("Delete failed: "+e.message);return;}
  rUsers(document.getElementById("vh"));
}
async function rPw(id,name){
  const p=prompt("New password for "+name+":");
  if(!p)return;
  try{await DB.update("pv_users",id,{password:p});APP.users=APP.users.map(u=>u.id===id?{...u,password:p}:u);alert("Password updated!");}
  catch(e){alert("Update failed: "+e.message);}
}

async function nextNum(type, prefix) {
  APP.counters[type] = (APP.counters[type]||0) + 1;
  // pv_counters uses 'name' as its primary key, not 'id'
  await sbFetch("pv_counters?name=eq." + type, "PATCH", {value: APP.counters[type]});
  return prefix + String(APP.counters[type]).padStart(4,"0");
}

function fillCustEmail(selId, emailId) {
  const v = document.getElementById(selId)?.value;
  const c = APP.customers.find(x => x.id === v);
  const el = document.getElementById(emailId);
  if(el && c?.email) el.value = c.email;
}

function addLineItem(containerId, totalId) {
  const wrap = document.getElementById(containerId); if(!wrap) return;
  const row = document.createElement("div");
  row.style.cssText = "display:grid;grid-template-columns:3fr 1fr 1fr 1fr auto;gap:8px;margin-bottom:8px;align-items:center";
  row.innerHTML = `
    <input placeholder="e.g. Beetroot Tea (50 packs)" style="font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 10px;border:1.5px solid var(--gray-200);border-radius:7px;width:100%">
    <input type="number" placeholder="1" min="0" step="0.01" value="1" style="font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 10px;border:1.5px solid var(--gray-200);border-radius:7px;width:100%;text-align:right">
    <input placeholder="units" style="font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 10px;border:1.5px solid var(--gray-200);border-radius:7px;width:100%">
    <input type="number" placeholder="0.00" min="0" step="0.01" value="0" style="font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 10px;border:1.5px solid var(--gray-200);border-radius:7px;width:100%;text-align:right">
    <button onclick="this.closest('[style]').remove();updateDocTotal('${containerId}','${containerId.replace('line-items','tax').replace('qline-items','qtax').replace('iline-items','itax')}','${totalId}')" style="background:none;border:none;cursor:pointer;font-size:18px;color:#9ca3af;padding:4px">✕</button>`;
  const inputs = row.querySelectorAll("input");
  inputs[1].addEventListener("input", () => updateDocTotal(containerId, containerId.includes("q")?"qtax":"itax", totalId));
  inputs[3].addEventListener("input", () => updateDocTotal(containerId, containerId.includes("q")?"qtax":"itax", totalId));
  wrap.appendChild(row);
}

function getLineItems(containerId) {
  const wrap = document.getElementById(containerId); if(!wrap) return [];
  return Array.from(wrap.children).map(row => {
    const inputs = row.querySelectorAll("input");
    const qty = parseFloat(inputs[1]?.value)||0;
    const price = parseFloat(inputs[3]?.value)||0;
    return {description: inputs[0]?.value||"", quantity: qty, unit: inputs[2]?.value||"units", unit_price: price, total: qty*price};
  }).filter(r => r.description && r.unit_price > 0);
}

function addProductLine(containerId, taxId, totalId, pickerId) {
  const sel = document.getElementById(pickerId);
  if(!sel || !sel.value) { alert("Please select a product first."); return; }
  const opt = sel.selectedOptions[0];
  const desc  = opt.dataset.desc  || "";
  const unit  = opt.dataset.unit  || "units";
  const price = parseFloat(opt.dataset.price) || 0;
  const wrap  = document.getElementById(containerId); if(!wrap) return;
  const row   = document.createElement("div");
  row.style.cssText = "display:grid;grid-template-columns:3fr 1fr 1fr 1fr auto;gap:8px;margin-bottom:8px;align-items:center";
  row.innerHTML = `
    <input value="${desc}" placeholder="Description" style="font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 10px;border:1.5px solid var(--gray-200);border-radius:7px;width:100%">
    <input type="number" value="1" min="0" step="0.01" style="font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 10px;border:1.5px solid var(--gray-200);border-radius:7px;width:100%;text-align:right">
    <input value="${unit}" placeholder="unit" style="font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 10px;border:1.5px solid var(--gray-200);border-radius:7px;width:100%">
    <input type="number" value="${price}" min="0" step="0.01" style="font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 10px;border:1.5px solid var(--gray-200);border-radius:7px;width:100%;text-align:right">
    <button onclick="this.closest('div[style]').remove();updateDocTotal('${containerId}','${taxId}','${totalId}')" style="background:none;border:none;cursor:pointer;font-size:18px;color:#9ca3af;padding:4px;line-height:1">✕</button>`;
  const inputs = row.querySelectorAll("input");
  inputs[1].addEventListener("input", () => updateDocTotal(containerId, taxId, totalId));
  inputs[3].addEventListener("input", () => updateDocTotal(containerId, taxId, totalId));
  wrap.appendChild(row);
  sel.value = "";
  updateDocTotal(containerId, taxId, totalId);
}

function updateDocTotal(containerId, taxId, totalId) {
  const items = getLineItems(containerId);
  const subtotal = items.reduce((s,r) => s+r.total, 0);
  const taxRate = parseFloat(document.getElementById(taxId)?.value)||0;
  const taxAmt = subtotal * (taxRate/100);
  const total = subtotal + taxAmt;
  const el = document.getElementById(totalId);
  if(el) el.textContent = ZMW(total);
}

async function saveQuote(editId) {
  const custSel = document.getElementById("qcust")?.value;
  const cust = APP.customers.find(x => x.id === custSel);
  if(!custSel || custSel === "_manual") { const el=document.getElementById("qmsg"); if(el)el.innerHTML='<div class="alert aerr">Please select a client.</div>'; return; }
  const items = getLineItems("qline-items");
  if(!items.length) { const el=document.getElementById("qmsg"); if(el)el.innerHTML='<div class="alert aerr">Add at least one line item.</div>'; return; }
  const subtotal = items.reduce((s,r)=>s+r.total,0);
  const taxRate = parseFloat(document.getElementById("qtax")?.value)||0;
  const taxAmt = subtotal*(taxRate/100);
  const total = subtotal + taxAmt;

  try {
    let qId, qNum;
    if(editId==="new") {
      qNum = await nextNum("quote","QUO-");
      qId = UID();
      const qRow = {id:qId, number:qNum, customer_id:custSel, customer_name:cust.name, customer_email:document.getElementById("qemail")?.value||cust.email||"", date:document.getElementById("qdate")?.value, valid_until:document.getElementById("qvalid")?.value, status:"draft", notes:document.getElementById("qnotes")?.value, subtotal, tax_rate:taxRate, tax_amount:taxAmt, total};
      await DB.insert("pv_quotes", qRow);
      APP.quotes.unshift({...qRow});
      for(const item of items) { const iRow={id:UID(),quote_id:qId,...item}; await DB.insert("pv_quote_items",iRow); }
    } else {
      qId = editId;
      const qRow = {customer_id:custSel, customer_name:cust.name, customer_email:document.getElementById("qemail")?.value||"", date:document.getElementById("qdate")?.value, valid_until:document.getElementById("qvalid")?.value, notes:document.getElementById("qnotes")?.value, subtotal, tax_rate:taxRate, tax_amount:taxAmt, total};
      await DB.update("pv_quotes", qId, qRow);
      APP.quotes = APP.quotes.map(q => q.id===qId ? {...q,...qRow} : q);
    }
    ST.quoteForm=undefined;
    rQuotes(document.getElementById("vh"), false);
  } catch(e) { const el=document.getElementById("qmsg"); if(el)el.innerHTML='<div class="alert aerr">Save failed: '+e.message+'</div>'; }
}

async function convertToInvoice(quoteId) {
  const q = APP.quotes.find(x=>x.id===quoteId); if(!q) return;
  if(!confirm(`Convert quote ${q.number} to an invoice?`)) return;
  let items = [];
  try { items = await DB.all("pv_quote_items?quote_id=eq."+quoteId); } catch(e){}
  try {
    const invNum = await nextNum("invoice","INV-");
    const invId = UID();
    const dueDate = new Date(); dueDate.setDate(dueDate.getDate()+30);
    const invRow = {id:invId, number:invNum, quote_id:quoteId, customer_id:q.customer_id, customer_name:q.customer_name, customer_email:q.customer_email, date:TD(), due_date:dueDate.toISOString().slice(0,10), status:"draft", notes:q.notes, subtotal:q.subtotal, tax_rate:q.tax_rate, tax_amount:q.tax_amount, total:q.total};
    await DB.insert("pv_invoices", invRow);
    for(const item of items) { await DB.insert("pv_invoice_items",{id:UID(),invoice_id:invId,description:item.description,quantity:item.quantity,unit:item.unit,unit_price:item.unit_price,total:item.total}); }
    await DB.update("pv_quotes", quoteId, {status:"converted"});
    APP.quotes = APP.quotes.map(q2 => q2.id===quoteId ? {...q2,status:"converted"} : q2);
    APP.invoices.unshift({...invRow});
    alert(`Invoice ${invNum} created from quote ${q.number}!`);
    APP.tab="invoices"; ST.invoiceView=invId; ST.quoteView=null;
    render();
  } catch(e) { alert("Conversion failed: "+e.message); }
}

      <thead><tr><th>Number</th><th>Date</th><th>Client</th><th>Due date</th><th>Status</th><th class="tr">Total</th><th></th></tr></thead>

async function saveInvoice(editId) {
  const custSel = document.getElementById("icust")?.value;
  const cust = APP.customers.find(x=>x.id===custSel);
  if(!custSel){const el=document.getElementById("iinvmsg");if(el)el.innerHTML='<div class="alert aerr">Please select a client.</div>';return;}
  const items = getLineItems("iline-items");
  if(!items.length){const el=document.getElementById("iinvmsg");if(el)el.innerHTML='<div class="alert aerr">Add at least one line item.</div>';return;}
  const subtotal = items.reduce((s,r)=>s+r.total,0);
  const taxRate = parseFloat(document.getElementById("itax")?.value)||0;
  const taxAmt = subtotal*(taxRate/100);
  const total = subtotal+taxAmt;
  try {
    let invId;
    if(editId==="new"){
      const invNum = await nextNum("invoice","INV-");
      invId = UID();
      const invRow={id:invId,number:invNum,customer_id:custSel,customer_name:cust.name,customer_email:document.getElementById("iemail")?.value||cust.email||"",date:document.getElementById("idate")?.value,due_date:document.getElementById("idue")?.value,status:"draft",notes:document.getElementById("inotes")?.value,subtotal,tax_rate:taxRate,tax_amount:taxAmt,total};
      await DB.insert("pv_invoices",invRow);
      APP.invoices.unshift({...invRow});
      for(const item of items){await DB.insert("pv_invoice_items",{id:UID(),invoice_id:invId,...item});}
    } else {
      invId=editId;
      const invRow={customer_id:custSel,customer_name:cust.name,customer_email:document.getElementById("iemail")?.value||"",date:document.getElementById("idate")?.value,due_date:document.getElementById("idue")?.value,notes:document.getElementById("inotes")?.value,subtotal,tax_rate:taxRate,tax_amount:taxAmt,total};
      await DB.update("pv_invoices",invId,invRow);
      APP.invoices=APP.invoices.map(i=>i.id===invId?{...i,...invRow}:i);
    }

async function markInvoicePaid(invId) {
  const inv = APP.invoices.find(x=>x.id===invId); if(!inv) return;
  const method = prompt("Payment method (Bank Transfer, Cash, Mobile Money, Cheque):", "Bank Transfer");
  if(!method) return;
  try {
    const paidDate = TD();
    await DB.update("pv_invoices", invId, {status:"paid", paid_date:paidDate, paid_amount:inv.total});
    APP.invoices = APP.invoices.map(i=>i.id===invId?{...i,status:"paid",paid_date:paidDate,paid_amount:inv.total}:i);
    // Auto-create receipt
    const recNum = await nextNum("receipt","REC-");
    const recId = UID();
    const recRow={id:recId,number:recNum,invoice_id:invId,customer_id:inv.customer_id,customer_name:inv.customer_name,customer_email:inv.customer_email,date:paidDate,amount:inv.total,payment_method:method,notes:`Payment for invoice ${inv.number}`};
    await DB.insert("pv_receipts",recRow);
    APP.receipts.unshift({...recRow});
    alert(`✓ Invoice marked as paid!\nReceipt ${recNum} automatically generated.`);
    ST.invoiceView=invId;
    rInvoices(document.getElementById("vh"),false);
  } catch(e){alert("Error: "+e.message);}
}

function printDoc(docId) {
  const el = document.getElementById(docId); if(!el) return;
  const w = window.open("","_blank");
  const printHTML = [
    '<!DOCTYPE html><html><head><title>PV Farms Document<\/title>',
    '<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">',
    '<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:\'DM Sans\',sans-serif;padding:40px;max-width:700px;margin:0 auto}@media print{body{padding:20px}}<\/style>',
    '<\/head><body>',
    el.innerHTML,
    '<script>window.onload=()=>{window.print();}<\/scr' + 'ipt>',
    '<\/body><\/html>'
  ].join('');
  w.document.write(printHTML);
  w.document.close();
}

async function emailDoc(docId, type) {
  // Find the document
  let doc, subject, bodyText, toEmail;
  if(type==="quote") {
    doc = APP.quotes.find(x=>x.id===docId);
    subject = `Quote ${doc?.number} from PV Farms`;
    toEmail = doc?.customer_email;
    bodyText = `Dear ${doc?.customer_name},\n\nPlease find attached your quote ${doc?.number} for ${ZMW(doc?.total)}.\n\nThis quote is valid until ${FD(doc?.valid_until)}.\n\nThank you for your business.\n\nPV Farms`;
  } else if(type==="invoice") {
    doc = APP.invoices.find(x=>x.id===docId);
    subject = `Invoice ${doc?.number} from PV Farms — Due ${FD(doc?.due_date)}`;
    toEmail = doc?.customer_email;
    bodyText = `Dear ${doc?.customer_name},\n\nPlease find attached invoice ${doc?.number} for ${ZMW(doc?.total)}.\n\nPayment is due by ${FD(doc?.due_date)}.\n\nThank you.\n\nPV Farms`;
  } else {
    doc = APP.receipts.find(x=>x.id===docId);
    subject = `Receipt ${doc?.number} from PV Farms`;
    toEmail = doc?.customer_email;
    bodyText = `Dear ${doc?.customer_name},\n\nThank you for your payment of ${ZMW(Number(doc?.amount))}. Please find your receipt ${doc?.number} attached.\n\nPV Farms`;
  }
  if(!toEmail) { alert("No email address for this client. Please update the client's email in the Customers section."); return; }
  // Open mailto link
  const mailto = `mailto:${toEmail}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(bodyText)}`;
  window.open(mailto);
  alert(`Your email app will open with the message pre-filled for ${toEmail}.\n\nTip: Use the Download PDF button to attach the document to your email.`);
}

async function updateStatus(table, id, status, tab) {
  try {
    await DB.update(table, id, {status});
    if(tab==="quotes") APP.quotes = APP.quotes.map(q=>q.id===id?{...q,status}:q);
    if(tab==="invoices") APP.invoices = APP.invoices.map(i=>i.id===id?{...i,status}:i);
    render();
  } catch(e){alert("Update failed: "+e.message);}
}

      <button class="btn btn-s" onclick="ST.empForm=undefined;rEmployees(document.getElementById('vh'),${ro})">Cancel</button>
    </div>
    <div id="empmsg"></div>
  </div>`;

  document.getElementById("ept")?.addEventListener("change", function(){

    if(lbl)lbl.textContent=this.value==="casual"?"Daily rate (ZMW)":"Monthly salary (ZMW)";

}

async function saveEmp(editId) {
  const name = document.getElementById("en")?.value.trim();
  if(!name){const el=document.getElementById("empmsg");if(el)el.innerHTML='<div class="alert aerr">Name is required.</div>';return;}
  const d={name,employee_number:document.getElementById("enum")?.value.trim(),id_number:document.getElementById("eid")?.value.trim(),phone:document.getElementById("eph")?.value.trim(),email:document.getElementById("eem")?.value.trim(),position:document.getElementById("epos")?.value.trim(),department:document.getElementById("edep")?.value.trim(),pay_type:document.getElementById("ept")?.value,basic_salary:parseFloat(document.getElementById("erate")?.value)||0,nssf_number:document.getElementById("enss")?.value.trim(),bank_name:document.getElementById("ebank")?.value.trim(),bank_account:document.getElementById("eacc")?.value.trim(),start_date:document.getElementById("estart")?.value,status:document.getElementById("estat")?.value};
  try{
    if(editId==="new"){const nid=UID();await DB.insert("pv_employees",{...d,id:nid});APP.employees.push({...d,id:nid});}
    else{await DB.update("pv_employees",editId,d);APP.employees=APP.employees.map(e=>e.id===editId?{...e,...d}:e);}
  }catch(e){const el=document.getElementById("empmsg");if(el)el.innerHTML='<div class="alert aerr">Save failed: '+e.message+'</div>';return;}
  ST.empForm=undefined;rEmployees(document.getElementById("vh"),false);
}

async function delEmp(id){
  if(!confirm("Remove this employee?"))return;
  try{await DB.del("pv_employees",id);APP.employees=APP.employees.filter(e=>e.id!==id);}
  catch(e){alert("Delete failed: "+e.message);return;}
  rEmployees(document.getElementById("vh"),false);
}

function fillPayslipRate() {
  const sel = document.getElementById("pse");
  const opt = sel?.selectedOptions[0];
  if(!opt) return;
  const payType = opt.dataset.pay;
  const rate = opt.dataset.rate||0;
  const daysField = document.getElementById("days-field");
  const rateField = document.getElementById("rate-field");
  const rateLabel = document.getElementById("rate-label");
  const rateInput = document.getElementById("psrate");
  if(payType==="casual") {
    if(daysField) daysField.style.display="block";
    if(rateLabel) rateLabel.textContent="Daily rate (ZMW)";
    if(rateInput) rateInput.value=rate;
  } else {
    if(daysField) daysField.style.display="none";
    if(rateLabel) rateLabel.textContent="Basic salary (ZMW)";
    if(rateInput) rateInput.value=rate;
  }
  calcPayslip();
}

function calcPayslip() {
  const sel = document.getElementById("pse");
  const opt = sel?.selectedOptions[0];
  const payType = opt?.dataset.pay||"salary";
  const rate = parseFloat(document.getElementById("psrate")?.value)||0;
  const days = parseFloat(document.getElementById("psdays")?.value)||0;
  const basicPay = payType==="casual" ? rate*days : rate;
  const otHrs = parseFloat(document.getElementById("psot")?.value)||0;
  const otRate = parseFloat(document.getElementById("psotrate")?.value)||0;
  const otPay = otHrs * otRate;
  const allow = parseFloat(document.getElementById("psallow")?.value)||0;
  const gross = basicPay + otPay + allow;

  // Auto-calculate Zambia statutory deductions
  const napsa = Math.min(basicPay * 0.05, 1073.50); // NAPSA 5% capped
  const nhima = basicPay * 0.01; // NHIMA 1%
  if(document.getElementById("psnapsa")) document.getElementById("psnapsa").value = napsa.toFixed(2);
  if(document.getElementById("psnhima")) document.getElementById("psnhima").value = nhima.toFixed(2);

  const paye = parseFloat(document.getElementById("pspaye")?.value)||0;
  const other = parseFloat(document.getElementById("psoth")?.value)||0;
  const totalDed = napsa + nhima + paye + other;
  const net = gross - totalDed;

  if(document.getElementById("cal-gross")) document.getElementById("cal-gross").textContent = ZMW(gross);
  if(document.getElementById("cal-ded")) document.getElementById("cal-ded").textContent = ZMW(totalDed);
  if(document.getElementById("cal-net")) document.getElementById("cal-net").textContent = ZMW(Math.max(0,net));
}

async function savePayslip() {
  const empId = document.getElementById("pse")?.value;
  const emp = APP.employees.find(e=>e.id===empId);
  if(!empId||!emp){const el=document.getElementById("psmsg");if(el)el.innerHTML='<div class="alert aerr">Please select an employee.</div>';return;}
  const opt = document.getElementById("pse")?.selectedOptions[0];
  const payType = opt?.dataset.pay||emp.pay_type;
  const rate = parseFloat(document.getElementById("psrate")?.value)||0;
  const days = parseFloat(document.getElementById("psdays")?.value)||0;
  const basicPay = payType==="casual"?rate*days:rate;
  const otHrs = parseFloat(document.getElementById("psot")?.value)||0;
  const otRate = parseFloat(document.getElementById("psotrate")?.value)||0;
  const otPay = otHrs*otRate;
  const allow = parseFloat(document.getElementById("psallow")?.value)||0;
  const gross = basicPay+otPay+allow;
  const napsa = parseFloat(document.getElementById("psnapsa")?.value)||0;
  const nhima = parseFloat(document.getElementById("psnhima")?.value)||0;
  const paye = parseFloat(document.getElementById("pspaye")?.value)||0;
  const other = parseFloat(document.getElementById("psoth")?.value)||0;
  const totalDed = napsa+nhima+paye+other;
  const net = Math.max(0, gross-totalDed);

  try {
    const psNum = await nextNum("payslip","PAY-");
    const psId = UID();
    const psRow = {id:psId,number:psNum,employee_id:empId,employee_name:emp.name,period_start:document.getElementById("pss")?.value,period_end:document.getElementById("pse2")?.value,pay_type:payType,basic_pay:basicPay,days_worked:days,daily_rate:payType==="casual"?rate:0,overtime_hours:otHrs,overtime_rate:otRate,overtime_pay:otPay,allowances:allow,allowance_notes:document.getElementById("psaln")?.value,gross_pay:gross,napsa_deduction:napsa,nhima_deduction:nhima,paye_deduction:paye,other_deductions:other,other_deduction_notes:document.getElementById("psothn")?.value,total_deductions:totalDed,net_pay:net,payment_method:document.getElementById("pspm")?.value,status:"draft",notes:document.getElementById("psnotes")?.value};
    await DB.insert("pv_payslips",psRow);
    APP.payslips.unshift({...psRow});
    ST.payslipForm=undefined;ST.payslipView=psId;
    rPayroll(document.getElementById("vh"),false);
  } catch(e){const el=document.getElementById("psmsg");if(el)el.innerHTML='<div class="alert aerr">Save failed: '+e.message+'</div>';}
}

function payRow(label, amount, color) {
  return `<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--gray-100);font-size:13px">

  </div>`;
}

async function approvePayslip(id) {
  try{await DB.update("pv_payslips",id,{status:"approved"});APP.payslips=APP.payslips.map(p=>p.id===id?{...p,status:"approved"}:p);}
  catch(e){alert("Error: "+e.message);return;}
  rPayroll(document.getElementById("vh"),false);
}

async function markPayslipPaid(id) {
  const pdate = prompt("Payment date:", TD()); if(!pdate) return;
  try{await DB.update("pv_payslips",id,{status:"paid",payment_date:pdate});APP.payslips=APP.payslips.map(p=>p.id===id?{...p,status:"paid",payment_date:pdate}:p);}
  catch(e){alert("Error: "+e.message);return;}
  rPayroll(document.getElementById("vh"),false);
}

async function generatePayslip(empId) {
  ST.payslipForm="new";

  // Pre-select employee after render
  setTimeout(()=>{
    const sel=document.getElementById("pse");
    if(sel){sel.value=empId;fillPayslipRate();}
  },200);
}
